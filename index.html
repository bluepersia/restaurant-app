<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jimmy's Diner</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&family=Smythe&display=swap"
      rel="stylesheet"
    />

    <!-- Global CSS-->
    <link rel="stylesheet" href="src/css/index.css" />
    <link rel="stylesheet" href="src/css/utilities.css" />

    <!-- Blocks -->
    <link rel="stylesheet" href="src/css/blocks/header.css" />
    <link rel="stylesheet" href="src/css/blocks/menu.css" />
    <link rel="stylesheet" href="src/css/blocks/order.css" />
    <link rel="stylesheet" href="src/css/blocks/button.css" />
    <link rel="stylesheet" href="src/css/blocks/checkout.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__inner container">
        <h1 class="header__title">Jimmy's Diner</h1>
        <p class="header__subtitle">The best burgers and pizzas in town.</p>
        <img
          src="src/img/burger.png"
          alt="Close-up of a cheeseburger with a fried egg, lettuce, and onion on a toasted bun."
          class="header__img"
        />
      </div>
    </header>

    <main class="main">
      <section class="menu" id="menu">
        <div class="menu__inner container">
          <h2 class="menu__title sr-only">Menu</h2>
          <ul class="menu__list reset-list" data-list></ul>
        </div>
      </section>

      <section class="order" id="order">
        <div class="order__inner container" data-inner>
          <h2 class="order__title">Your order</h2>

          <div class="order__summary" data-summary></div>

          <button
            class="order__complete-button button"
            data-complete
            aria-haspopup="dialog"
            aria-expanded="false"
            aria-controls="checkout"
          >
            Complete order
          </button>
        </div>
      </section>
    </main>

    <dialog class="checkout" id="checkout" aria-label="Checkout">
      <h2 class="checkout__title">Enter card details</h2>
      <form class="checkout__form" data-form>
        <label for="full-name" class="sr-only">Name:</label>
        <input
          type="text"
          id="full-name"
          name="full-name"
          placeholder="Enter your name"
          class="checkout__input"
          required
        />
        <label for="card-num" class="sr-only">Card Number:</label>
        <input
          type="text"
          id="card-num"
          name="card-num"
          placeholder="Enter card number"
          class="checkout__input"
          pattern="[0-9]+"
          required
        />
        <label for="cvv" class="sr-only">CVV:</label>
        <input
          type="text"
          id="cvv"
          name="cvv"
          placeholder="Enter CVV"
          class="checkout__input"
          required
        />
        <button class="checkout__pay-button button">Pay</button>
      </form>
    </dialog>
    <script src="./dist/js/index.js" type="module"></script>
  </body>
</html>
